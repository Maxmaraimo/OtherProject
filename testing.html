<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Dark Fantasy Game</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
    </style>
    <!-- Подключаем библиотеку Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

<script>
    // 1. Сцена и камера
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x050505); // Темный, туманный цвет

    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // 2. Создаем "землю" (dark stone floor)
    const geometry = new THREE.PlaneGeometry(50, 50);
    const material = new THREE.MeshStandardMaterial({ color: 0x222222 });
    const floor = new THREE.Mesh(geometry, material);
    floor.rotation.x = -Math.PI / 2;
    scene.add(floor);

    // 3. Свет для атмосферы (DirectionalLight)
    const light = new THREE.DirectionalLight(0x4a4e69, 1);
    light.position.set(5, 10, 5);
    scene.add(light);
    
    // Добавляем немного тумана (Fog) для дарк-фэнтези стиля
    scene.fog = new THREE.Fog(0x050505, 1, 30);

    // 4. Позиция камеры
    camera.position.set(0, 5, 10);
    camera.lookAt(0, 0, 0);

    // 5. Функция анимации
    function animate() {
        requestAnimationFrame(animate);
        renderer.render(scene, camera);
    }
    
    // Обработка изменения размера окна
    window.addEventListener('resize', () => {
        renderer.setSize(window.innerWidth, window.innerHeight);
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
    });

    animate();
</script>
</body>
</html>
